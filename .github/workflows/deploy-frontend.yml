# Deploys the frontend/index.html to GitHub Pages on every push to main.
# No build step — it's a single static HTML file.
#
# SETUP (one time only):
#   GitHub repo → Settings → Pages → Source → GitHub Actions
#   (leave branch/folder blank — this workflow handles publishing)

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'       # only re-deploy when the UI actually changes
  workflow_dispatch: {}     # allows manual trigger from the Actions tab

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend          # the entire frontend/ dir becomes the site root

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
